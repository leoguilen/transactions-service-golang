services:
  app:
    build: .
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - HTTP_PORT=5000
      - DB_CONNECTION_STRING=postgres://postgres:postgres@postgres:5432/transactions_db?sslmode=disable
    depends_on:
      - postgres

  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transactions_db
    volumes:
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
